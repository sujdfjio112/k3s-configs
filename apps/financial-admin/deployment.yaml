apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: financial-admin
  template:
    metadata:
      labels:
        app: financial-admin
    spec:
      containers:
      - name: financial-admin
        image: crpi-4gjhfmn9d3r2c9et.cn-hangzhou.personal.cr.aliyuncs.com/financial-admin/financial-admin:dev
        ports:
        - containerPort: 80